name: CI

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  eas-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
      - name: EAS Update (production)
        run: eas update --channel production --non-interactive
